    example_model: "o1-preview"
  - pattern: "o3-*"
    group_name: "gpt-5"
    example_model: "o3-mini"
  - pattern: "gemini-*"
    group_name: "gemini-2-pro"
    example_model: "gemini-2.5-pro"
